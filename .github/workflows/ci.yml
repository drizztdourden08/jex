name: CI

# Runs on demand (manual "Run workflow") and on pull requests.
# Direct pushes to main do NOT auto-run — release/verify by asking explicitly.
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck, lint, CSS tokens, structure (all packages)
        run: pnpm -r run check
